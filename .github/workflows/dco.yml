name: DCO Check

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: read
  contents: read

jobs:
  dco:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest
    steps:
      # No source checkout: a full-history checkout (fetch-depth: 0) issues a
      # wildcard `+refs/heads/*` fetch that some hosted/proxied runner networks
      # reject at clone time ("Repository not found"), failing before sign-off is
      # ever validated. The PR commits REST endpoint carries the full commit
      # message (and thus the Signed-off-by trailer) for every commit in the PR,
      # so we validate directly against the API — checkout-free and proxy-safe.
      - name: Check DCO sign-off on all PR commits
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          MISSING=0
          # Paginate; each element's .commit.message includes the trailer block.
          gh api --paginate "repos/${REPO}/pulls/${PR}/commits" \
            --jq '.[] | [.sha, (.commit.message | @base64)] | @tsv' \
          | while IFS=$'\t' read -r sha msg_b64; do
              msg=$(printf '%s' "$msg_b64" | base64 -d)
              if printf '%s\n' "$msg" | grep -qE "^Signed-off-by: .+ <.+@.+>"; then
                echo "  ok   ${sha} signed off"
              else
                echo "  FAIL ${sha} missing Signed-off-by trailer"
                echo "${sha}" >> /tmp/dco_missing
              fi
            done
          if [ -f /tmp/dco_missing ]; then
            echo ""
            echo "DCO FAILED: the following commits are missing a Signed-off-by trailer:"
            cat /tmp/dco_missing
            echo "Add it with: git commit -s --amend   (format: Signed-off-by: Name <email>)"
            exit 1
          fi
          echo "DCO OK: all PR commits signed off"
