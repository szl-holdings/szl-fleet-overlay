kind: UDSBundle
metadata:
  name: szl-fleet-overlay
  description: "SZL Fleet UDS Bundle — deploys UDS Core + SZL fleet overlay for all 5 flagships"
  version: "0.1.0"
  # Doctrine: v11 LOCKED 749/14/163 at kernel commit c7c0ba17 | SLSA L1

packages:
  # Phase 1: UDS Core (prerequisite — must be deployed first)
  - name: core
    repository: ghcr.io/defenseunicorns/packages/uds/core
    # UPSTREAM flavor (NOT registry1/Iron Bank); verified published + pullable on GHCR.
    ref: "0.42.0-upstream"
    overrides:
      istio-admin-gateway:
        uds-istio-admin-gateway:
          values:
            - path: "service.annotations"
              value: {}
      istio-tenant-gateway:
        uds-istio-tenant-gateway:
          values:
            - path: "service.annotations"
              value: {}

  # Phase 2: SZL Fleet Overlay
  - name: szl-fleet-overlay
    path: "."
    ref: "0.1.0"
